name: deploy

# main への push（対象パス変更時）または手動実行で以下をデプロイする:
#   1) mockup  → Firebase Hosting（静的配信）
#   2) api     → Cloud Run（コンテナ。DB は RDS PostgreSQL）
#
# 必要な Repository secrets（scripts/setup-deploy-secrets.ps1 で設定）:
#   [mockup]
#   FIREBASE_SERVICE_ACCOUNT ... サービスアカウント鍵 JSON（roles/firebasehosting.admin）
#   FIREBASE_PROJECT_ID      ... Firebase プロジェクト ID
#   [api]
#   GCP_SERVICE_ACCOUNT      ... デプロイ用サービスアカウント鍵 JSON
#                                （roles/run.admin, artifactregistry.admin, iam.serviceAccountUser, secretmanager.admin）
#   GCP_PROJECT_ID           ... GCP プロジェクト ID（通常 FIREBASE_PROJECT_ID と同一）
#   GCP_REGION               ... デプロイ先リージョン（例: asia-northeast1）
#   CLOUD_RUN_SERVICE        ... Cloud Run サービス名（例: akebono-office-api）
#   DATABASE_URL             ... RDS PostgreSQL 接続文字列（Secret Manager 経由で注入）
#   DB_SSL                   ... disable / require / verify（RDS は require 以上を推奨）
#   API_CORS_ORIGINS         ... CORS 許可オリジン（例: https://<project>.web.app）
#
# API の secrets が未設定の場合、deploy-api は警告を出してスキップする
# （mockup のみの運用を止めない = 非ブロッキング）。
#
# デプロイ前テストゲート: tests ジョブ（test-suite.yml = 単体・総合・シナリオの 3 種）が
# 1 つでも失敗すると deploy-mockup / deploy-api の両方が中断される。
# 何がどう失敗したかは Actions の Summary・::error:: アノテーション・artifact `e2e-logs` に記録される。
on:
  push:
    branches: [main]
    paths:
      - 'mockup/**'
      - 'api/**'
      - 'shared/**'
      - 'e2e/**'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/test-suite.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-live
  cancel-in-progress: false

jobs:
  # ---------- デプロイ前テストゲート（単体・総合・シナリオ） ----------
  tests:
    uses: ./.github/workflows/test-suite.yml

  # ---------- モックアップ（Firebase Hosting） ----------
  deploy-mockup:
    runs-on: ubuntu-latest
    needs: tests
    defaults:
      run:
        working-directory: mockup
    steps:
      - uses: actions/checkout@v4

      - name: Secrets の存在チェック
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          missing=0
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::Repository secret FIREBASE_SERVICE_ACCOUNT が未設定です"
            missing=1
          fi
          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "::error::Repository secret FIREBASE_PROJECT_ID が未設定です"
            missing=1
          fi
          if [ "$missing" = "1" ]; then
            echo "::notice::scripts/setup-deploy-secrets.ps1 を実行して設定してください（手順は .ai-native/outputs/phase7/deploy-guide.md 参照）"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mockup/package-lock.json

      - name: 依存インストール
        run: npm ci

      - name: 静的ビルド
        env:
          # 未設定なら完全モックモード（従来どおり）。API 接続版を配信する場合は
          # secrets API_BASE_URL / FIREBASE_WEB_CONFIG を設定する（setup-deploy-secrets.ps1）
          NUXT_PUBLIC_API_BASE: ${{ secrets.API_BASE_URL }}
          NUXT_PUBLIC_FIREBASE_CONFIG: ${{ secrets.FIREBASE_WEB_CONFIG }}
        run: npm run generate

      - name: Firebase Hosting へデプロイ（live チャネル）
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: mockup

  # ---------- API（Cloud Run。テストは tests ジョブ = test-suite.yml で実施済み） ----------
  deploy-api:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Secrets の存在チェック（未設定なら以降をスキップ）
        id: check
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -z "$GCP_SERVICE_ACCOUNT" ] || [ -z "$GCP_PROJECT_ID" ] || [ -z "$GCP_REGION" ] \
             || [ -z "$CLOUD_RUN_SERVICE" ] || [ -z "$DATABASE_URL" ] || [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "::warning::API デプロイ用 secrets（GCP_* / CLOUD_RUN_SERVICE / DATABASE_URL / FIREBASE_PROJECT_ID）が未設定のため deploy-api をスキップします。scripts/setup-deploy-secrets.ps1 で設定してください"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.ready == 'true'

      - uses: google-github-actions/auth@v2
        if: steps.check.outputs.ready == 'true'
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        if: steps.check.outputs.ready == 'true'
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Artifact Registry リポジトリを用意（冪等）
        if: steps.check.outputs.ready == 'true'
        env:
          REGION: ${{ secrets.GCP_REGION }}
        run: |
          gcloud artifacts repositories describe akebono-office --location="$REGION" >/dev/null 2>&1 \
            || gcloud artifacts repositories create akebono-office \
                 --repository-format=docker --location="$REGION" \
                 --description="akebono-office コンテナイメージ"
          gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet

      - name: イメージをビルドしてプッシュ
        if: steps.check.outputs.ready == 'true'
        env:
          REGION: ${{ secrets.GCP_REGION }}
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT/akebono-office/$SERVICE:$GITHUB_SHA"
          docker build -f api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: DATABASE_URL を Secret Manager へ登録（冪等）
        if: steps.check.outputs.ready == 'true'
        env:
          SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          SECRET_NAME="$SERVICE-database-url"
          if ! gcloud secrets describe "$SECRET_NAME" >/dev/null 2>&1; then
            gcloud secrets create "$SECRET_NAME" --replication-policy=automatic
          fi
          # 値が変わったときだけ新バージョンを追加（毎回の無駄なバージョン増加を防ぐ）
          CURRENT="$(gcloud secrets versions access latest --secret="$SECRET_NAME" 2>/dev/null || true)"
          if [ "$CURRENT" != "$DATABASE_URL" ]; then
            printf '%s' "$DATABASE_URL" | gcloud secrets versions add "$SECRET_NAME" --data-file=-
          fi
          # 実行サービスアカウント（既定: Compute Engine 既定 SA）へ読取権限を付与（冪等）
          PROJECT_NUMBER="$(gcloud projects describe "$PROJECT" --format='value(projectNumber)')"
          gcloud secrets add-iam-policy-binding "$SECRET_NAME" \
            --member="serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com" \
            --role="roles/secretmanager.secretAccessor" --quiet >/dev/null

      # カレンダー連携（F-06-8）: OAuth クライアントシークレットとトークン暗号化鍵を Secret Manager へ。
      # secrets 未設定ならスキップ（連携無効のままデプロイ継続 = 原則4）
      - name: カレンダー連携の secrets を Secret Manager へ登録（冪等・任意）
        if: steps.check.outputs.ready == 'true'
        env:
          SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
        run: |
          if [ -z "$GOOGLE_OAUTH_CLIENT_SECRET" ] || [ -z "$TOKEN_ENCRYPTION_KEY" ]; then
            echo "::notice::GOOGLE_OAUTH_CLIENT_SECRET / TOKEN_ENCRYPTION_KEY が未設定のためカレンダー連携は無効のままデプロイします（setup-deploy-secrets.ps1 -GoogleOauthClientId ... で設定）"
            echo "CALENDAR_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi
          PROJECT_NUMBER="$(gcloud projects describe "$PROJECT" --format='value(projectNumber)')"
          put_secret() {
            local NAME="$1" VALUE="$2"
            if ! gcloud secrets describe "$NAME" >/dev/null 2>&1; then
              gcloud secrets create "$NAME" --replication-policy=automatic
            fi
            local CURRENT
            CURRENT="$(gcloud secrets versions access latest --secret="$NAME" 2>/dev/null || true)"
            if [ "$CURRENT" != "$VALUE" ]; then
              printf '%s' "$VALUE" | gcloud secrets versions add "$NAME" --data-file=-
            fi
            gcloud secrets add-iam-policy-binding "$NAME" \
              --member="serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com" \
              --role="roles/secretmanager.secretAccessor" --quiet >/dev/null
          }
          put_secret "$SERVICE-google-oauth-secret" "$GOOGLE_OAUTH_CLIENT_SECRET"
          put_secret "$SERVICE-token-encryption-key" "$TOKEN_ENCRYPTION_KEY"
          echo "CALENDAR_READY=true" >> "$GITHUB_ENV"

      # AI 機能（Vertex AI）とカレンダー同期（Calendar API）の有効化 + 実行 SA への権限付与。
      # 補助処理として非ブロッキング（権限不足時は警告 + deploy-guide.md の手動手順へフォールバック）
      - name: Vertex AI / Calendar API の有効化 + 実行 SA へ権限付与（冪等・非ブロッキング）
        if: steps.check.outputs.ready == 'true'
        env:
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud services enable aiplatform.googleapis.com --project "$PROJECT" \
            || echo "::warning::aiplatform.googleapis.com の有効化に失敗しました。オーナー権限で 'gcloud services enable aiplatform.googleapis.com' を実行してください（deploy-guide.md 参照）"
          # カレンダー同期（events API）に必要。OAuth トークン交換は Calendar API 無効でも成功するため見落としやすい
          gcloud services enable calendar-json.googleapis.com --project "$PROJECT" \
            || echo "::warning::calendar-json.googleapis.com の有効化に失敗しました。オーナー権限で 'gcloud services enable calendar-json.googleapis.com' を実行してください（deploy-guide.md 参照）"
          # ドキュメント管理のドライブ取込（バッチ7l）。OAuth 連携と同じ資格情報で drive.readonly を使う
          gcloud services enable drive.googleapis.com --project "$PROJECT" \
            || echo "::warning::drive.googleapis.com の有効化に失敗しました。オーナー権限で有効化してください（deploy-guide.md 参照）"
          PROJECT_NUMBER="$(gcloud projects describe "$PROJECT" --format='value(projectNumber)')"
          gcloud projects add-iam-policy-binding "$PROJECT" \
            --member="serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com" \
            --role="roles/aiplatform.user" --condition=None --quiet >/dev/null \
            || echo "::warning::実行 SA への roles/aiplatform.user 付与に失敗しました。オーナー権限で付与してください（deploy-guide.md 参照）"

      # ドキュメント保管（バッチ7l = Firebase の Cloud Storage バケット）。STORAGE_BUCKET secret 登録時のみ。
      # 未登録の環境は DB bytea フォールバックで全機能が動作する（署名 URL のみ GCS 専用）
      - name: ドキュメント保管（Cloud Storage）の準備（冪等・非ブロッキング）
        if: steps.check.outputs.ready == 'true'
        env:
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
        run: |
          if [ -z "$STORAGE_BUCKET" ]; then
            echo "STORAGE_BUCKET 未設定のためスキップ（DB フォールバック保管で動作します）"
            exit 0
          fi
          # 署名 URL（IAM signBlob）に必要
          gcloud services enable iamcredentials.googleapis.com --project "$PROJECT" \
            || echo "::warning::iamcredentials.googleapis.com の有効化に失敗しました（署名 URL が使えません。base64 ダウンロードへ縮退）"
          # バケットが無ければ作成（Firebase の既定バケットが既にあれば no-op）。公開アクセスは禁止
          if ! gcloud storage buckets describe "gs://$STORAGE_BUCKET" --project "$PROJECT" >/dev/null 2>&1; then
            gcloud storage buckets create "gs://$STORAGE_BUCKET" --project "$PROJECT" \
              --location "${REGION:-asia-northeast1}" --uniform-bucket-level-access \
              || echo "::warning::バケット作成に失敗しました。Firebase コンソールで Cloud Storage を有効化するか手動作成してください"
          fi
          PROJECT_NUMBER="$(gcloud projects describe "$PROJECT" --format='value(projectNumber)')"
          RUNTIME_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          gcloud storage buckets add-iam-policy-binding "gs://$STORAGE_BUCKET" \
            --member="serviceAccount:${RUNTIME_SA}" --role="roles/storage.objectAdmin" >/dev/null \
            || echo "::warning::実行 SA への storage.objectAdmin 付与に失敗しました。オーナー権限で付与してください"
          # 実行 SA が自分自身で signBlob する（署名 URL の生成）ための権限
          gcloud iam service-accounts add-iam-policy-binding "$RUNTIME_SA" \
            --member="serviceAccount:${RUNTIME_SA}" --role="roles/iam.serviceAccountTokenCreator" --project "$PROJECT" >/dev/null \
            || echo "::warning::実行 SA への iam.serviceAccountTokenCreator（self）付与に失敗しました。署名 URL は base64 ダウンロードへ縮退します"

      - name: Cloud Run へデプロイ
        if: steps.check.outputs.ready == 'true'
        env:
          REGION: ${{ secrets.GCP_REGION }}
          SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          DB_SSL: ${{ secrets.DB_SSL }}
          API_CORS_ORIGINS: ${{ secrets.API_CORS_ORIGINS }}
          VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
          VERTEX_MODEL: ${{ secrets.VERTEX_MODEL }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
        run: |
          ENV_VARS="AUTH_MODE=firebase,FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID},DB_SSL=${DB_SSL:-require},CORS_ORIGINS=${API_CORS_ORIGINS},VERTEX_PROJECT_ID=${PROJECT},VERTEX_LOCATION=${VERTEX_LOCATION:-global},VERTEX_MODEL=${VERTEX_MODEL:-gemini-2.5-flash}"
          # ドキュメント保管（バッチ7l）。未設定 = DB bytea フォールバック
          if [ -n "$STORAGE_BUCKET" ]; then
            ENV_VARS="$ENV_VARS,STORAGE_BUCKET=${STORAGE_BUCKET}"
          fi
          SECRET_FLAGS="DATABASE_URL=$SERVICE-database-url:latest"
          # カレンダー連携（secrets 登録済みのときのみ有効化）
          if [ "${CALENDAR_READY:-false}" = "true" ] && [ -n "$GOOGLE_OAUTH_CLIENT_ID" ]; then
            ENV_VARS="$ENV_VARS,GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}"
            SECRET_FLAGS="$SECRET_FLAGS,GOOGLE_OAUTH_CLIENT_SECRET=$SERVICE-google-oauth-secret:latest,TOKEN_ENCRYPTION_KEY=$SERVICE-token-encryption-key:latest"
          fi
          # --no-cpu-throttling: AI タスクの承認後自動実行（バッチ7i = HTTP 応答後のバックグラウンド
          # LLM 実行）を応答返却後も CPU 割当されたまま走らせるため（PR #58 R1 C-2）。
          # 課金はインスタンス稼働時間ベースへ変わる（min-instances 0 のためアイドル時はゼロスケール）
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 0 \
            --max-instances 3 \
            --no-cpu-throttling \
            --set-env-vars "$ENV_VARS" \
            --set-secrets "$SECRET_FLAGS"
          echo "デプロイ完了: $(gcloud run services describe "$SERVICE" --region "$REGION" --format='value(status.url)')"
